<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZeroDrop — Payment Failover Router</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #FFFFFF;
  --surface: #F8FAFC;
  --surface-elevated: #FFFFFF;
  --primary: #0F172A;
  --secondary: #0EA5E9;
  --accent: #22D3EE;
  --text: #0F172A;
  --text-muted: #64748B;
  --text-on-primary: #FFFFFF;
  --border: #E2E8F0;
  --border-subtle: #F1F5F9;
  --success: #22C55E;
  --warning: #F59E0B;
  --danger: #EF4444;
  --info: #3B82F6;
  --font-body: Inter, system-ui, -apple-system, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-pill: 999px;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;
  --shadow-dropdown: 0 20px 40px rgba(15,23,42,0.12);
  --sidebar-width: 260px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  display: flex;
}
::selection { background: var(--accent); color: var(--primary); }

.hidden { display: none !important; }

/* ===== Login Screen ===== */
.login-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #F8FAFC 0%, #F0F9FF 50%, #ECFEFF 100%);
  z-index: 1000;
}
.login-card {
  width: 400px;
  background: var(--surface-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: var(--space-2xl);
  box-shadow: var(--shadow-dropdown);
}
.login-logo {
  font-family: var(--font-body);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
  text-align: center;
  margin-bottom: var(--space-xs);
}
.login-logo span { color: var(--secondary); }
.login-subtitle {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: var(--space-xl);
}
.login-field {
  display: flex; flex-direction: column; gap: var(--space-xs);
  margin-bottom: var(--space-md);
}
.login-field label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}
.login-field input {
  min-height: 44px;
  padding: 0 var(--space-md);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text);
  background: var(--surface);
}
.login-field input:focus {
  outline: none;
  border-color: var(--secondary);
  box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
}
.login-btn {
  width: 100%;
  min-height: 44px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--primary);
  color: var(--text-on-primary);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: var(--space-sm);
}
.login-btn:hover { background: #1E293B; }
.login-hint {
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  margin-top: var(--space-md);
}

/* ===== App Shell ===== */
.app { display: flex; width: 100%; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.sidebar-head {
  padding: var(--space-lg) var(--space-lg);
  border-bottom: 1px solid var(--border-subtle);
}
.sidebar-brand {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--primary);
  text-decoration: none;
}
.sidebar-brand span { color: var(--secondary); }
.sidebar-nav {
  padding: var(--space-md) var(--space-sm);
  flex: 1;
  display: flex; flex-direction: column; gap: 2px;
}
.nav-item {
  display: flex; align-items: center; gap: var(--space-md);
  padding: 10px var(--space-md);
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  text-decoration: none;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: var(--font-body);
  transition: background 0.15s, color 0.15s;
}
.nav-item:hover { background: var(--border-subtle); color: var(--text); }
.nav-item.active { background: var(--primary); color: var(--text-on-primary); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.6; }
.nav-item.active svg { opacity: 1; }
.nav-label { display: flex; align-items: center; justify-content: space-between; flex: 1; }
.nav-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; padding: 0 6px;
  border-radius: var(--radius-pill);
  background: var(--border-subtle);
  color: var(--secondary);
  font-size: 11px; font-weight: 700;
}
.nav-item.active .nav-badge { background: rgba(255,255,255,0.2); color: #fff; }
.nav-section {
  padding: var(--space-lg) var(--space-md) var(--space-sm);
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted);
}
.sidebar-foot {
  padding: var(--space-md) var(--space-sm);
  border-top: 1px solid var(--border-subtle);
}
.user-card {
  display: flex; align-items: center; gap: var(--space-md);
  padding: var(--space-sm) var(--space-md);
  border-radius: var(--radius-md);
}
.user-avatar {
  width: 36px; height: 36px;
  border-radius: var(--radius-pill);
  background: var(--secondary);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; color: #fff;
}
.user-name { font-size: 14px; font-weight: 600; }
.user-role { font-size: 12px; color: var(--text-muted); }

/* Main */
.main {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; overflow: hidden;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-md) var(--space-lg);
  background: var(--surface);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: var(--space-md); }
.topbar-right { display: flex; align-items: center; gap: var(--space-sm); }
.page-title {
  font-size: 20px; font-weight: 600; letter-spacing: -0.02em;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-sm);
  min-height: 38px; padding: 0 var(--space-lg);
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  cursor: pointer; text-decoration: none;
  transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--primary); color: var(--text-on-primary); border-color: var(--primary); }
.btn-primary:hover { background: #1E293B; }
.btn-secondary { background: var(--surface-elevated); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { border-color: var(--secondary); color: var(--secondary); }
.btn-accent { background: var(--secondary); color: #fff; border-color: var(--secondary); }
.btn-accent:hover { background: #0284C7; border-color: #0284C7; }
.btn-cyan { background: transparent; color: var(--accent); border-color: var(--accent); font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
.btn-cyan:hover { background: var(--accent); color: var(--primary); }
.btn-sm { min-height: 32px; padding: 0 var(--space-md); font-size: 13px; }
.btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-danger:hover { background: #DC2626; }
.btn-success { background: var(--success); color: #fff; border-color: var(--success); }
.btn-success:hover { background: #16A34A; }

.content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: var(--space-lg); scrollbar-gutter: stable;
}

/* ===== Metric Cards ===== */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
}
.metric-card.accent {
  border-left: 3px solid var(--accent);
}
.metric-card.recovered {
  border-left: 3px solid var(--success);
  background: linear-gradient(135deg, var(--surface) 0%, #F0FDF4 100%);
}
.metric-label {
  font-size: 13px; color: var(--text-muted); font-weight: 500;
}
.metric-value {
  font-family: var(--font-body);
  font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
  margin-top: var(--space-xs);
}
.metric-subtitle {
  font-size: 12px; color: var(--text-muted); margin-top: var(--space-xs);
}
.metric-change {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: var(--space-sm);
  font-size: 13px; font-weight: 600;
}
.metric-change.up { color: var(--success); }
.metric-change.down { color: var(--danger); }
.metric-change svg { width: 14px; height: 14px; }

/* ===== Cards ===== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: var(--space-lg);
}
.card-head {
  display: flex; justify-content: space-between; align-items: center; gap: var(--space-md);
  padding: var(--space-lg);
  border-bottom: 1px solid var(--border-subtle);
}
.card-title {
  font-size: 18px; font-weight: 600; letter-spacing: -0.02em;
}
.card-body { padding: var(--space-lg); }
.card-body.zero { padding: 0; }

/* ===== Activity Feed ===== */
.activity-feed {
  max-height: 420px;
  overflow-y: auto;
}
.activity-row {
  display: flex; align-items: flex-start; gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid var(--border-subtle);
  font-size: 13px;
  transition: background 0.15s;
}
.activity-row:last-child { border-bottom: none; }
.activity-row:hover { background: var(--border-subtle); }
.activity-dot {
  width: 8px; height: 8px;
  border-radius: var(--radius-pill);
  margin-top: 6px;
  flex-shrink: 0;
}
.activity-dot.cleared { background: var(--success); }
.activity-dot.rescued { background: var(--accent); }
.activity-dot.declined { background: var(--danger); }
.activity-info { flex: 1; min-width: 0; }
.activity-customer { font-weight: 600; }
.activity-path {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.activity-path .ok { color: var(--success); }
.activity-path .fail { color: var(--danger); }
.activity-path .lap { color: var(--warning); }
.activity-amount { font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
.activity-meta {
  text-align: right; flex-shrink: 0;
}
.activity-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* ===== Gateway Cards ===== */
.gateway-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  position: relative;
}
.gateway-card.preferred {
  border-color: var(--secondary);
  box-shadow: 0 0 0 1px var(--secondary);
}
.gateway-card.preferred::after {
  content: "★ Preferred";
  position: absolute; top: var(--space-md); right: var(--space-md);
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--secondary);
}
.gateway-name { font-size: 16px; font-weight: 600; }
.gateway-status {
  display: inline-flex; align-items: center; gap: var(--space-xs);
  margin-top: var(--space-sm);
  font-family: var(--font-mono); font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.gateway-status::before {
  content: ""; width: 8px; height: 8px; border-radius: var(--radius-pill);
}
.gateway-status.healthy::before { background: var(--success); }
.gateway-status.healthy { color: var(--success); }
.gateway-status.degraded::before { background: var(--warning); animation: pulse 1s infinite; }
.gateway-status.degraded { color: var(--warning); }
.gateway-status.down::before { background: var(--danger); }
.gateway-status.down { color: var(--danger); }
.gateway-latency {
  font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); margin-top: var(--space-xs);
}
.gateway-uptime {
  font-size: 13px; color: var(--text-muted); margin-top: 2px;
}
.gateway-actions {
  display: flex; gap: var(--space-sm); margin-top: var(--space-md);
}

/* ===== Status Badges ===== */
.badge {
  display: inline-flex; align-items: center; gap: var(--space-xs);
  padding: 3px 10px; border-radius: var(--radius-pill);
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.badge::before { content: ""; width: 6px; height: 6px; border-radius: var(--radius-pill); }
.badge-success { background: #F0FDF4; color: #15803D; }
.badge-success::before { background: #15803D; }
.badge-warning { background: #FFFBEB; color: #B45309; }
.badge-warning::before { background: #B45309; }
.badge-danger { background: #FEF2F2; color: #B91C1C; }
.badge-danger::before { background: #B91C1C; }
.badge-info { background: #F0F9FF; color: #0369A1; }
.badge-info::before { background: #0369A1; }
.badge-cyan { background: #ECFEFF; color: #0891B2; }
.badge-cyan::before { background: #0891B2; }

/* ===== Charts ===== */
.charts-row {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}
.chart-bars {
  display: flex; align-items: flex-end; gap: var(--space-sm);
  height: 200px;
  padding-bottom: var(--space-lg);
  border-bottom: 1px solid var(--border-subtle);
}
.bar-group {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: var(--space-xs);
  height: 100%; justify-content: flex-end;
}
.bar-wrap {
  display: flex; gap: 2px; align-items: flex-end;
  height: 100%; width: 100%; justify-content: center;
}
.bar-saved {
  width: 30px;
  border-radius: 4px 4px 0 0;
  background: var(--secondary);
  transition: opacity 0.15s;
}
.bar-lost {
  width: 30px;
  border-radius: 4px 4px 0 0;
  background: var(--danger);
  opacity: 0.6;
  transition: opacity 0.15s;
}
.bar-saved:hover, .bar-lost:hover { opacity: 1; }
.bar-label { font-size: 12px; color: var(--text-muted); }
.bar-value { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }

.donut-wrap {
  display: flex; flex-direction: column; align-items: center; gap: var(--space-md);
}
.donut {
  width: 140px; height: 140px;
  border-radius: var(--radius-pill);
  position: relative;
}
.donut-hole {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 80px; height: 80px;
  border-radius: var(--radius-pill);
  background: var(--surface);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.donut-value {
  font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
}
.donut-label {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.legend-list {
  display: flex; flex-direction: column; gap: var(--space-sm); width: 100%;
}
.legend-item {
  display: flex; align-items: center; gap: var(--space-sm); font-size: 13px;
}
.legend-dot { width: 8px; height: 8px; border-radius: var(--radius-pill); flex-shrink: 0; }
.legend-val { margin-left: auto; font-weight: 600; }

/* ===== Table ===== */
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  padding: var(--space-md) var(--space-lg);
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface);
}
td {
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid var(--border-subtle);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--border-subtle); }
td.amount { font-family: var(--font-mono); font-weight: 600; font-size: 13px; }
td.amount.fee { color: var(--secondary); }
.claim-btn {
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text);
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 3px 10px; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.claim-btn:hover { background: var(--border-subtle); border-color: var(--secondary); }
.claim-btn.filed { background: #FEF3C7; color: #92400E; border-color: #F59E0B; }
.claim-btn.settled { background: #F0FDF4; color: #15803D; border-color: #22C55E; }

/* ===== Settings ===== */
.settings-form {
  max-width: 560px;
}
.setting-group {
  margin-bottom: var(--space-lg);
}
.setting-group label {
  display: block;
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: var(--space-sm);
}
.setting-group select {
  width: 100%;
  min-height: 44px;
  padding: 0 var(--space-md);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: var(--font-body); font-size: 15px;
  color: var(--text);
  background: var(--surface);
}
.setting-group select:focus {
  outline: none;
  border-color: var(--secondary);
  box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
}
.setting-hint {
  font-size: 13px; color: var(--text-muted); margin-top: var(--space-sm);
}
.saved-msg {
  font-family: var(--font-mono); font-size: 13px;
  color: var(--success); margin-top: var(--space-sm);
  opacity: 0; transition: opacity 0.3s;
}
.saved-msg.show { opacity: 1; }

/* ===== Animations ===== */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.activity-row.new { animation: slideIn 0.3s ease-out; }

/* ===== Dashboard: Cart + Gateway Row ===== */
.dash-section { margin-bottom: var(--space-lg); }

.cart-card {
  width: 240px; margin: 0 auto var(--space-md);
  background: var(--primary); color: var(--text-on-primary);
  border-radius: var(--radius-lg); padding: var(--space-lg);
  text-align: center; position: relative;
}
.cart-card-label {
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.1em;
  opacity: 0.7; margin-bottom: var(--space-xs);
}
.cart-card-count {
  font-size: 36px; font-weight: 700; letter-spacing: -0.02em;
}
.cart-card-hint {
  font-size: 12px; opacity: 0.5; margin-top: var(--space-xs);
}

.gateway-row {
  display: flex; align-items: stretch; justify-content: center;
  gap: 0; position: relative;
}
.gateway-row .gateway-card {
  flex: 0 0 220px;
  position: relative;
  transition: box-shadow 0.15s;
  contain: layout style paint;
}
.gateway-row .gateway-card.flash-pass {
  box-shadow: 0 0 0 3px var(--success), 0 0 24px rgba(34,197,94,0.25);
}
.gateway-row .gateway-card.flash-fail {
  box-shadow: 0 0 0 3px var(--danger), 0 0 24px rgba(239,68,68,0.25);
}
.gw-connector {
  display: flex; align-items: center; justify-content: center;
  width: 32px; flex-shrink: 0;
  color: var(--border); font-size: 16px; font-weight: 700;
}
.gw-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 16px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  border-radius: var(--radius-lg);
  opacity: 0; transition: opacity 0.25s; pointer-events: none;
  z-index: 5;
}
.gw-overlay.show { opacity: 1; }
.gw-overlay.cleared { background: rgba(240,253,244,0.95); color: #15803D; }
.gw-overlay.saved { background: rgba(236,254,255,0.95); color: #0891B2; }
.gw-overlay.lost { background: rgba(254,242,242,0.95); color: #B91C1C; }

.routing-packet {
  position: fixed; z-index: 999; pointer-events: none;
  width: 48px; height: 48px;
  border-radius: var(--radius-md);
  background: var(--surface); border: 2px solid var(--secondary);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 14px; font-weight: 700;
  color: var(--secondary);
  box-shadow: 0 8px 24px rgba(15,23,42,0.18);
  transition: left 0.3s cubic-bezier(0.2,0,0,1), top 0.3s cubic-bezier(0.2,0,0,1), border-color 0.2s, background 0.2s, color 0.2s, opacity 0.2s;
}
.routing-packet.cleared { border-color: var(--success); background: #F0FDF4; color: #15803D; }
.routing-packet.saved { border-color: var(--accent); background: #ECFEFF; color: #0891B2; }
.routing-packet.lost { border-color: var(--danger); background: #FEF2F2; color: #B91C1C; }

/* ===== Stats Row ===== */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}
.inner-metric-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}
.inner-metric {
  padding: var(--space-lg);
  border-right: 1px solid var(--border-subtle);
}
.inner-metric:last-child { border-right: none; }
.inner-metric strong {
  display: block;
  font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
}
.inner-metric span { font-size: 13px; color: var(--text-muted); }

/* ===== Flash Sale Indicator ===== */
.flash-indicator {
  display: inline-flex; align-items: center; gap: var(--space-sm);
  padding: 6px var(--space-md);
  border-radius: var(--radius-pill);
  background: #FEF3C7;
  color: #92400E;
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  animation: pulse 1s infinite;
}
.flash-indicator::before {
  content: ""; width: 6px; height: 6px; border-radius: var(--radius-pill);
  background: #F59E0B;
}

/* ===== Transaction Detail Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(15,23,42,0.5);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open {
  opacity: 1; pointer-events: auto;
}
.modal-box {
  width: 420px; max-width: 90vw;
  background: var(--surface-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-dropdown);
  padding: var(--space-2xl);
  transform: translateY(8px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal-box {
  transform: translateY(0);
}
.modal-box h3 {
  font-size: 18px; font-weight: 600; letter-spacing: -0.02em;
  margin-bottom: var(--space-lg);
}
.modal-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: var(--space-sm) 0;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 14px;
}
.modal-row:last-child { border-bottom: none; }
.modal-row .label { color: var(--text-muted); font-weight: 500; }
.modal-row .value { font-weight: 600; text-align: right; }
.modal-row .value.mono { font-family: var(--font-mono); }
.modal-close {
  margin-top: var(--space-lg);
  width: 100%;
}
.view-link {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--secondary);
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  margin-top: 4px;
}
.view-link:hover {
  color: var(--accent);
  text-decoration: underline;
}

/* ===== Responsive ===== */
@media (max-width: 1200px) {
  .metric-grid { grid-template-columns: repeat(3, 1fr); }
  .charts-row { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr; }
}
@media (max-width: 860px) {
  .sidebar { display: none; }
  .metric-grid { grid-template-columns: 1fr; }
}

<script>
// ============================================================
// ZERODROP PROTOTYPE — STATE & LOGIC
// ============================================================

const GATEWAYS = ['Hyp', 'CreditGuard', 'Tranzila', 'Grow'];
const CUSTOMERS = ['Sarah Chen','Marcus Webb','Elena Voss','Daniel Park','Amira Hassan','Liam Osei','Priya Kapoor','Tomas Reyes','Yuki Tanaka','Noah Kim'];
const AMTS = [50,75,99,120,150,189,220,250,290,340,390,450,520,600,720,850,990,1150,1350,1550,1800,2100,2500];

let state = {
  preferredGateway: localStorage.getItem('zdPreferred') || 'Hyp',
  gateways: {},
  checkouts: [],
  ledger: [],
  totalGMV: 0,
  rescuedGMV: 0,
  claimableGMV: 0,
  totalBill: 0,
  streamRunning: false,
  streamInterval: null,
  flashActive: false,
  flashInterval: null,
  currentView: 'dashboard',
  txnCounter: 1
};

// Initialize gateway state
GATEWAYS.forEach(g => {
  state.gateways[g] = {
    status: 'healthy',
    latency: rand(80, 200),
    uptime: randInt(99, 100),
    downSince: null,
    forcedDown: false
  };
});

// ===== HELPERS =====
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randInt(min, max) { return rand(min, max); }
function now() { return new Date().toLocaleTimeString('en-US', { hour12: false }); }
function ago(min) {
  const d = new Date(Date.now() - min * 60000);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}
function fmt(n) {
  if (n >= 1000000) return '₪' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return '₪' + (n / 1000).toFixed(1) + 'k';
  return '₪' + n.toFixed(0);
}
function gatewayHealth(st) {
  if (st === 'down') return 'down';
  if (st === 'degraded') return 'degraded';
  return 'healthy';
}

// ===== ROUTING ENGINE (FR-3) =====
function getAvailableGateways(exclude) {
  const healthy = [], degraded = [];
  GATEWAYS.forEach(g => {
    if (exclude.has(g)) return;
    const gs = state.gateways[g];
    if (gs.forcedDown || gs.status === 'down') return;
    if (gs.status === 'degraded') degraded.push(g);
    else healthy.push(g);
  });
  return { healthy, degraded };
}

function orderedLapGateways(preferred, exclude) {
  const { healthy, degraded } = getAvailableGateways(exclude);
  const order = [];
  // Preferred first if healthy
  if (preferred && healthy.includes(preferred)) {
    order.push(preferred);
    healthy.splice(healthy.indexOf(preferred), 1);
  }
  // Then other healthy
  order.push(...healthy);
  // Then degraded (preferred first if degraded)
  if (preferred && degraded.includes(preferred)) {
    order.push(preferred);
    degraded.splice(degraded.indexOf(preferred), 1);
  }
  order.push(...degraded);
  return order;
}

function routeCheckout(amount, customer, orderId) {
  const preferred = state.preferredGateway;
  const laps = [];
  let rescued = false;
  let finalGateway = null;
  let finalStatus = 'declined';

  const hardFails = new Set();

  const lapRates = [0.55, 0.20, 0.10];

  for (let li = 0; li < 3; li++) {
    if (finalGateway) break;
    laps.push({ num: li + 1, attempts: [] });
    const gateways = orderedLapGateways(preferred, hardFails);
    for (const gw of gateways) {
      const fails = Math.random() < lapRates[li];
      laps[li].attempts.push({ gw, result: fails ? 'fail' : 'success' });
      if (!fails) {
        finalGateway = gw;
        finalStatus = li === 0 ? 'cleared' : 'rescued';
        rescued = li > 0;
        break;
      } else {
        if (Math.random() < 0.05) hardFails.add(gw);
      }
    }
  }

  return {
    orderId, customer, amount, preferred,
    finalGateway, finalStatus, rescued,
    laps,
    timestamp: now(),
    fee: Math.round(amount * (rescued ? 0.02 : 0.01))
  };
}

// ===== PROCESS CHECKOUT =====
function processCheckout() {
  const amount = AMTS[Math.floor(Math.random() * AMTS.length)];
  const customer = CUSTOMERS[Math.floor(Math.random() * CUSTOMERS.length)];
  const orderId = '#SHOP-' + rand(1000, 9999);

const result = routeCheckout(amount, customer, orderId);
result.txnId = state.txnCounter++;
state.checkouts.unshift(result);

  state.totalGMV += amount;
  state.totalBill += result.fee;

  if (result.finalStatus === 'rescued') {
    state.rescuedGMV += amount;
  }

  if (result.finalStatus === 'declined') {
    state.claimableGMV += amount;
    state.ledger.unshift({
      ...result,
      claimStatus: 'pending'
    });
  }

  if (state.currentView === 'dashboard') { animateRoutingV2(result); }
  updateLedgerBadge();
}

// ===== ROUTING ANIMATION V2: Cart → Gateway Row =====
function animateRoutingV2(result) {
  const cart = document.getElementById('cartCard');
  const row = document.getElementById('gatewayRow');
  if (!cart || !row) { renderDashboard(); updateCartCounter(); return; }

  // Get cart bottom-center (packet start position)
  const cr = cart.getBoundingClientRect();
  const startX = cr.left + cr.width / 2;
  const startY = cr.bottom + 12;

  // Get gateway card center positions
  const posMap = {};
  GATEWAYS.forEach(g => {
    const el = document.getElementById('gwCard_' + g);
    if (!el) return;
    const r = el.getBoundingClientRect();
    posMap[g] = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  });

  // Create packet
  const pkt = document.createElement('div');
  pkt.className = 'routing-packet';
  pkt.innerHTML = '₪' + result.amount;
  pkt.style.left = startX + 'px';
  pkt.style.top = startY + 'px';
  pkt.style.transform = 'translate(-50%, -50%) scale(0.6)';
  document.body.appendChild(pkt);

  // Build ordered list of (gateway, isSuccess) steps from routing result
  const steps = [];
  let foundSuccess = false;
  result.laps.forEach((lap, li) => {
    if (foundSuccess) return;
    if (li > 0) steps.push({ type: 'lap-pause', lap: lap.num });
    let lapHasSuccess = false;
    lap.attempts.forEach(a => {
      if (foundSuccess || lapHasSuccess) return;
      if (a.result === 'success') {
        steps.push({ type: 'attempt', gw: a.gw, pass: true, lap: lap.num });
        lapHasSuccess = true;
        foundSuccess = true;
      } else if (a.result === 'fail') {
        steps.push({ type: 'attempt', gw: a.gw, pass: false, lap: lap.num });
      } else if (a.result === 'skip-down') {
        steps.push({ type: 'skip', gw: a.gw, lap: lap.num });
      }
    });
  });

  // Execute steps sequentially
  let totalDelay = 0;
  let currentStep = 0;
  const STEP_MS = 380;
  const PAUSE_MS = 600;

  function runStep() {
    if (currentStep >= steps.length) {
      // All steps done — finalize
      finish();
      return;
    }
    const step = steps[currentStep];
    currentStep++;

    if (step.type === 'lap-pause') {
      // Brief return to cart for new lap
      pkt.style.transition = 'all 0.3s cubic-bezier(0.2,0,0,1)';
      pkt.style.left = startX + 'px';
      pkt.style.top = (startY - 10) + 'px';
      pkt.style.transform = 'translate(-50%, -50%) scale(0.6)';
      totalDelay += 400;
      setTimeout(runStep, PAUSE_MS);
      return;
    }

    const pos = posMap[step.gw];
    if (!pos) { setTimeout(runStep, 50); return; }

    if (step.type === 'skip') {
      // Fly to gateway briefly then continue
      setTimeout(() => {
        pkt.style.transition = 'all 0.25s cubic-bezier(0.2,0,0,1)';
        pkt.style.left = pos.x + 'px';
        pkt.style.top = pos.y + 'px';
        pkt.style.transform = 'translate(-50%, -50%) scale(0.7)';
        pkt.style.opacity = '0.5';
      }, totalDelay);
      totalDelay += 50;
      setTimeout(() => { pkt.style.opacity = '1'; runStep(); }, STEP_MS + 50);
      return;
    }

    // Normal attempt — fly to gateway
    const delay = totalDelay;
    setTimeout(() => {
      pkt.style.transition = 'all 0.3s cubic-bezier(0.2,0,0,1)';
      pkt.style.left = pos.x + 'px';
      pkt.style.top = pos.y + 'px';
      pkt.style.transform = 'translate(-50%, -50%) scale(1)';
      pkt.style.opacity = '1';

      // Flash the gateway card
      const card = document.getElementById('gwCard_' + step.gw);
      if (card) {
        card.classList.add(step.pass ? 'flash-pass' : 'flash-fail');
        setTimeout(() => card.classList.remove('flash-pass', 'flash-fail'), 400);
      }
    }, delay);
    totalDelay += STEP_MS;
    setTimeout(runStep, STEP_MS);
  }

  function finish() {
    // Color the packet
    if (result.finalStatus === 'cleared') pkt.classList.add('cleared');
    else if (result.finalStatus === 'rescued') pkt.classList.add('saved');
    else pkt.classList.add('lost');

    // Show overlay on the last gateway card
    const lastGw = result.finalGateway || steps.filter(s => s.type === 'attempt').pop()?.gw;
    if (lastGw) {
      const overlay = document.getElementById('gwOverlay_' + lastGw);
      if (overlay) {
        const cls = result.finalStatus === 'cleared' ? 'cleared' : (result.finalStatus === 'rescued' ? 'saved' : 'lost');
        const txt = result.finalStatus === 'cleared' ? 'CLEAR' : (result.finalStatus === 'rescued' ? 'SAVED' : 'LOST');
        overlay.textContent = txt;
        overlay.className = 'gw-overlay show ' + cls;
        setTimeout(() => { overlay.className = 'gw-overlay'; }, 2000);
      }
    }

    // Fade out packet
    setTimeout(() => {
      pkt.style.opacity = '0';
      pkt.style.transform = 'translate(-50%, -50%) scale(0.4)';
      setTimeout(() => pkt.remove(), 300);
    }, 400);

    // Update activity feed and counter
    updateCartCounter();
    renderDashboard();
  }

  updateCartCounter();
  setTimeout(runStep, 200);
}

// ===== FLASH SALE (FR-10) =====
function simulateFlashSale() {
  if (state.flashActive) {
    stopFlashSale();
    return;
  }
  state.flashActive = true;
  document.getElementById('flashIndicator').classList.remove('hidden');
  document.getElementById('flashSaleBtn').innerHTML = '⏹ Stop Flash Sale';
  document.getElementById('flashSaleBtn').classList.add('btn-danger');
  document.getElementById('flashSaleBtn').classList.remove('btn-accent');

  let count = 0;
  state.flashInterval = setInterval(() => {
    processCheckout();
    count++;
  }, 200);
}

function stopFlashSale() {
  if (state.flashInterval) {
    clearInterval(state.flashInterval);
    state.flashInterval = null;
  }
  state.flashActive = false;
  document.getElementById('flashIndicator').classList.add('hidden');
  document.getElementById('flashSaleBtn').innerHTML = '⚡ Simulate Flash Sale';
  document.getElementById('flashSaleBtn').classList.add('btn-accent');
  document.getElementById('flashSaleBtn').classList.remove('btn-danger');
}

// ===== GATEWAY HEALTH SIMULATION =====
function updateGatewayHealth() {
  GATEWAYS.forEach(g => {
    const gw = state.gateways[g];
    if (gw.forcedDown) {
      gw.status = 'down';
      gw.latency = 0;
      gw.uptime = Math.max(0, gw.uptime - randInt(0, 1));
      return;
    }
    const r = Math.random();
    if (gw.status === 'healthy' && r < 0.05) gw.status = 'degraded';
    else if (gw.status === 'degraded' && r < 0.08) gw.status = 'down';
    else if (gw.status === 'down' && r < 0.15) gw.status = 'degraded';
    else if (gw.status === 'degraded' && r < 0.20) gw.status = 'healthy';
    else if (gw.status === 'healthy' && r < 0.02) gw.status = 'healthy'; // mostly stays

    if (gw.status === 'healthy') gw.latency = rand(60, 180);
    else if (gw.status === 'degraded') gw.latency = rand(180, 450);
    else gw.latency = 0;

    if (gw.status === 'healthy') gw.uptime = Math.min(100, gw.uptime + randInt(0, 1));
  });

  if (state.currentView === 'dashboard') renderGatewayRow();
}

// ===== STREAM CONTROL =====
function startStream() {
  if (state.streamInterval) return;
  state.streamRunning = true;
  document.getElementById('streamToggle').innerHTML = '⏸ Pause Stream';
  state.streamInterval = setInterval(() => processCheckout(), rand(1200, 3000));
}
function stopStream() {
  state.streamRunning = false;
  document.getElementById('streamToggle').innerHTML = '▶ Resume Stream';
  if (state.streamInterval) { clearInterval(state.streamInterval); state.streamInterval = null; }
}
function toggleStream() {
  if (state.streamRunning) {
    stopStream();
    stopFlashSale();
  }
  else startStream();
}

// ===== LEDGER BADGE =====
function updateLedgerBadge() {

// ===== NAVIGATION =====
function navigate(view) {
  state.currentView = view;
  document.querySelectorAll('.nav-item[data-view]').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  const titles = { dashboard: 'Dashboard', billing: 'GMV & Billing', ledger: 'Reconciliation Ledger', settings: 'Settings' };
  document.getElementById('pageTitle').textContent = titles[view] || 'Dashboard';
  renderView(view);
}
document.querySelectorAll('.nav-item[data-view]').forEach(el => {
  el.addEventListener('click', () => navigate(el.dataset.view));
});

// ===== RENDER VIEWS =====
function renderView(view) {
  const area = document.getElementById('contentArea');
  switch (view) {
    case 'dashboard': renderDashboardFull(area); break;
    case 'billing': renderBilling(area); break;
    case 'ledger': renderLedger(area); break;
    case 'settings': renderSettings(area); break;
  }
}

      <div class="card-body zero">

function renderGatewayRow() {
  const row = document.getElementById('gatewayRow');
  if (!row) return;
  row.innerHTML = GATEWAYS.map((g, i) => {
    const gw = state.gateways[g];
    const isPref = state.preferredGateway === g;
    const down = gw.forcedDown || gw.status === 'down';
    const degraded = gw.status === 'degraded';
    const statusClass = down ? 'down' : (degraded ? 'degraded' : 'healthy');
    const statusLabel = gw.forcedDown ? 'Forced Down' : (down ? 'Down' : (degraded ? 'Degraded' : 'Healthy'));
    const connector = i < GATEWAYS.length - 1 ? '<div class="gw-connector">→</div>' : '';
    return `
      <div class="gateway-card ${isPref ? 'preferred' : ''}" id="gwCard_${g}">
        <div class="gateway-name">${g}</div>
        <div class="gateway-status ${statusClass}">${statusLabel}</div>
        <div class="gateway-latency">${gw.latency ? gw.latency + 'ms' : '—'}</div>
        <div class="gateway-uptime">${gw.uptime}% uptime (1h)</div>
        <div class="gateway-actions">
          ${gw.forcedDown
            ? '<button class="btn btn-success btn-sm" onclick="recoverGatewayV2(\''+g+'\')">Recover</button>'
            : '<button class="btn btn-danger btn-sm" onclick="simOutageV2(\''+g+'\')">Simulate Outage</button>'}
        </div>
        <div class="gw-overlay" id="gwOverlay_${g}"></div>
      </div>${connector}`;
  }).join('');
}
function simOutageV2(gw) { state.gateways[gw].forcedDown = true; renderGatewayRow(); }
function recoverGatewayV2(gw) { state.gateways[gw].forcedDown = false; state.gateways[gw].status = 'healthy'; state.gateways[gw].latency = rand(60,180); renderGatewayRow(); }
function updateCartCounter() {
  const el = document.getElementById('cartCounter');
  if (el) el.textContent = state.checkouts.length;
}
function renderDashboard() {
  const feed = document.getElementById('activityFeed');
  if (!feed) return;
  if (state.checkouts.length === 0) {
    feed.innerHTML = '<div style="padding:var(--space-2xl);text-align:center;color:var(--text-muted);font-size:14px">Waiting for checkouts...</div>';
  } else {
    feed.innerHTML = state.checkouts.slice(0, 50).map(c => {
      let dotClass = c.finalStatus === 'cleared' ? 'cleared' : (c.finalStatus === 'rescued' ? 'rescued' : 'declined');
      let badgeHtml = '';
      if (c.finalStatus === 'cleared') badgeHtml = '<span class="badge badge-success" style="margin-top:4px">Cleared</span>';
      else if (c.finalStatus === 'rescued') badgeHtml = '<span class="badge badge-cyan" style="margin-top:4px">Rescued</span>';
      else badgeHtml = '<span class="badge badge-danger" style="margin-top:4px">Declined</span>';
      let pathHtml = buildPathHtml(c);
      return '<div class="activity-row new"><span class="activity-dot '+dotClass+'"></span><div class="activity-info"><div class="activity-customer">'+c.customer+' <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);font-weight:400">'+c.orderId+'</span></div><div class="activity-path">'+pathHtml+'</div>'+badgeHtml+'</div><div class="activity-meta"><div class="activity-amount">₪'+c.amount+'</div><div class="activity-time">'+c.timestamp+'</div><span class="view-link" onclick="showTransactionModal('+c.txnId+')">View →</span></div></div>';
    }).join('');
  }
  const countEl = document.getElementById('streamCount');
  if (countEl) countEl.textContent = state.checkouts.length + ' transactions';
  updateStatsBar();
}

function updateStatsBar() {
  const total = state.checkouts.length;
  const rescued = state.checkouts.filter(c => c.finalStatus === 'rescued').length;
  const cleared = state.checkouts.filter(c => c.finalStatus === 'cleared').length;
  const successRate = total > 0 ? ((cleared + rescued) / total * 100) : 0;

  const el = id => document.getElementById(id);
  const fmt = n => n.toLocaleString('en-US');
  if (el('statTransactions')) el('statTransactions').textContent = fmt(total);
  if (el('statVolume')) el('statVolume').textContent = '₪' + fmt(state.totalGMV);
  if (el('statSuccessRate')) el('statSuccessRate').textContent = total > 0 ? successRate.toFixed(1) + '%' : '—';
  if (el('statRescued')) el('statRescued').textContent = fmt(rescued);
  if (el('statRecovered')) el('statRecovered').textContent = '₪' + fmt(state.rescuedGMV);
}

function buildPathHtml(c) {
  let html = '';
  let totalAtt = 0;
  c.laps.forEach(lap => {
    lap.attempts.forEach(a => {
      totalAtt++;
      const cls = a.result === 'success' ? 'ok' : (a.result === 'skip-down' ? 'fail' : 'fail');
      const sym = a.result === 'success' ? ' ✓ ' : (a.result === 'skip-down' ? ' ✗↓ ' : ' ✗ ');
      html += '<span class="' + cls + '">' + a.gw + sym + '</span>';
    });
    if (lap.num < c.laps.length && c.laps[lap.num] && c.laps[lap.num].attempts.length > 0) {
      html += '<span class="lap">[L' + (lap.num+1) + ' retry] </span>';
    }
  });
  html += c.finalGateway ? '<span class="ok">→ ' + c.finalGateway + ' ✓</span>' : '<span class="fail">→ all failed</span>';
  return html;
}

// ===== TRANSACTION DETAIL MODAL =====
function showTransactionModal(txnId) {
  if (typeof txnId !== 'number') return;
  const c = state.checkouts.find(t => t.txnId === txnId);
  if (!c) return;

  let overlay = document.getElementById('txnModal');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'txnModal';
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
    document.body.appendChild(overlay);
  }

  const statusMap = { cleared: 'Cleared', rescued: 'Rescued (retry)', declined: 'Declined' };
  const routeCount = c.laps.reduce((s, lap) => s + lap.attempts.length, 0);

  overlay.innerHTML = `
    <div class="modal-box">
      <h3>Transaction Details</h3>
      <div class="modal-row"><span class="label">Order</span><span class="value mono">${c.orderId}</span></div>
      <div class="modal-row"><span class="label">Customer</span><span class="value">${c.customer}</span></div>
      <div class="modal-row"><span class="label">Amount</span><span class="value">₪${c.amount}</span></div>
      <div class="modal-row"><span class="label">Status</span><span class="value">${statusMap[c.finalStatus] || c.finalStatus}</span></div>
      <div class="modal-row"><span class="label">Final Gateway</span><span class="value mono">${c.finalGateway || '—'}</span></div>
      <div class="modal-row"><span class="label">Routes Tried</span><span class="value">${routeCount}</span></div>
      <div class="modal-row"><span class="label">Laps</span><span class="value">${c.laps.length}</span></div>
      <div class="modal-row"><span class="label">Processing Fee</span><span class="value">₪${c.fee} (${c.rescued ? '2%' : '1%'})</span></div>
      <div class="modal-row"><span class="label">Timestamp</span><span class="value mono" style="font-size:12px">${c.timestamp}</span></div>
      <button class="btn btn-secondary modal-close" onclick="document.getElementById('txnModal').classList.remove('open')">Close</button>
    </div>`;
  overlay.classList.add('open');
}

// --- BILLING ---

  area.innerHTML = `
    <div class="metric-grid">
      <div class="metric-card">
        <div class="metric-label">Total GMV</div>
        <div class="metric-value">${fmt(state.totalGMV)}</div>
        <div class="metric-change up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg> All handled</div>
      </div>

      </div>
      <div class="metric-card accent">
        <div class="metric-label">Total Bill (40₪ / txn)</div>
        <div class="metric-value" style="color:var(--secondary)">${fmt(state.totalBill)}</div>
        <div class="metric-change up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg> ${state.checkouts.length} × 40₪</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Insurance Coverage</div>
        <div class="metric-value">${fmt(500000)}</div>
        <div class="metric-change up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg> Active policy</div>
      </div>
    </div>
    <div class="charts-row">
      <div class="card">
        <div class="card-head"><h2 class="card-title">Weekly GMV breakdown</h2></div>
        <div class="card-body"><div id="weeklyChart" class="chart-bars"></div></div>
      </div>
      <div class="card">
        <div class="card-head"><h2 class="card-title">Routing outcomes</h2></div>
        <div class="card-body">
          <div class="donut-wrap">
            <div class="donut" style="background:conic-gradient(var(--secondary) 0deg ${rescuedDeg}deg, var(--danger) ${rescuedDeg}deg ${rescuedDeg+claimDeg}deg, var(--success) ${rescuedDeg+claimDeg}deg 360deg)"><div class="donut-hole"><span class="donut-value">${rescuedPct}%</span><span class="donut-label">rescued</span></div></div>
            <div class="legend-list">
              <div class="legend-item"><span class="legend-dot" style="background:var(--success)"></span>Cleared<span class="legend-val">${fmt(state.totalGMV - state.rescuedGMV - state.claimableGMV)}</span></div>
              <div class="legend-item"><span class="legend-dot" style="background:var(--secondary)"></span>Rescued <span class="legend-val">${fmt(state.rescuedGMV)}</span></div>
              <div class="legend-item"><span class="legend-dot" style="background:var(--danger)"></span>Lost <span class="legend-val">${fmt(state.claimableGMV)}</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  renderWeeklyChart();
}
function renderWeeklyChart() {
  const el = document.getElementById('weeklyChart');
  if (!el) return;
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  el.innerHTML = days.map(d => {
    const saved = rand(5, 50);
    const lost = rand(0, 5);
    const maxBar = 180;
    return '<div class="bar-group"><span class="bar-value">'+fmt(saved*1000)+'</span><div class="bar-wrap"><div class="bar-saved" style="height:'+(saved/maxBar*100)+'%"></div><div class="bar-lost" style="height:'+(lost/maxBar*100)+'%"></div></div><span class="bar-label">'+d+'</span></div>';
  }).join('');
}

// --- LEDGER ---
function renderLedger(area) {
  area.innerHTML = `
    <div class="metric-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:var(--space-lg)">
      <div class="metric-card">
        <div class="metric-label">Unrecoverable TXNs</div>
        <div class="metric-value" style="color:var(--danger)">${state.ledger.length}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Claimable Lost GMV</div>
        <div class="metric-value" style="color:var(--danger)">${fmt(state.claimableGMV)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Claims Filed</div>
        <div class="metric-value">${state.ledger.filter(l => l.claimStatus === 'filed' || l.claimStatus === 'settled').length}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><h2 class="card-title">Reconciliation Ledger</h2></div>
      <div class="card-body zero"><div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Order</th><th>Customer</th><th>Amount</th><th>Fee (40₪)</th><th>Gateways Attempted</th><th>Retry Laps</th><th>Claim</th></tr></thead>
          <tbody id="ledgerBody"></tbody>
        </table>
      </div></div>
    </div>
  `;
  renderLedgerBody();
}
function renderLedgerBody() {
  const tbody = document.getElementById('ledgerBody');
  if (!tbody) return;
  if (state.ledger.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="padding:var(--space-2xl);text-align:center;color:var(--text-muted)">No unrecoverable transactions yet. Try simulating a gateway outage.</td></tr>';
    return;
  }
  tbody.innerHTML = state.ledger.map((l, i) => {
    const gws = l.laps.flatMap(lap => lap.attempts.map(a => a.gw)).join(', ');
    const laps = l.laps.length;
    let claimBtnClass = 'claim-btn';
    if (l.claimStatus === 'filed') claimBtnClass += ' filed';
    if (l.claimStatus === 'settled') claimBtnClass += ' settled';
    return `<tr>
      <td style="font-family:var(--font-mono);font-size:12px">${l.timestamp}</td>
      <td style="font-family:var(--font-mono)">${l.orderId}</td>
      <td>${l.customer}</td>
      <td class="amount">₪${l.amount}</td>
      <td class="amount fee">40₪</td>
      <td style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">${gws}</td>
      <td style="font-family:var(--font-mono)">${laps} lap${laps!==1?'s':''}</td>
      <td><button class="${claimBtnClass}" onclick="cycleClaim(${i})">${l.claimStatus.toUpperCase()}</button></td>
    </tr>`;
  }).join('');
}
function cycleClaim(i) {
  const order = ['pending','filed','settled'];
  const cur = order.indexOf(state.ledger[i].claimStatus);
  state.ledger[i].claimStatus = order[(cur + 1) % 3];
  renderLedgerBody();
}
